name: CI

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main, github-actions-integration]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build and Test
    runs-on: macos-26
    timeout-minutes: 30

    env:
      PROJECT: ShatterBreak.xcodeproj
      SCHEME: ShatterBreak
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      RESULT_BUNDLE: ${{ github.workspace }}/ShatterBreak.xcresult
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.4.1.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and test
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            CODE_SIGNING_ALLOWED=NO \
          | xcbeautify

      - name: Upload test result bundle
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ShatterBreak.xcresult
          path: ${{ env.RESULT_BUNDLE }}
          if-no-files-found: ignore
          retention-days: 7
