name: PR Title

# We squash-merge, so each PR's title becomes the commit subject on main and
# drives the automatic version bump (see Scripts/compute-version.sh). This check
# keeps those titles in Conventional Commit form so the bump is trustworthy.

on:
  pull_request:
    types: [opened, edited, reopened, synchronize]

permissions:
  contents: read

jobs:
  lint-title:
    name: Conventional Commit title
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Validate PR title
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          # <type>[optional (scope)][optional !]: <description>
          pattern='^(feat|fix|perf|refactor|docs|style|test|build|ci|chore|revert)(\([a-z0-9 ._-]+\))?!?: .+'
          if printf '%s' "$PR_TITLE" | grep -qE "$pattern"; then
            echo "OK: $PR_TITLE"
          else
            echo "::error::PR title must follow Conventional Commits."
            echo "Got:      $PR_TITLE"
            echo "Examples: 'feat: add break reminder', 'fix(timer): correct sleep handling', 'feat!: redesign overlay API'"
            echo "Types:    feat fix perf refactor docs style test build ci chore revert"
            exit 1
          fi
