name: CodeQL

on:
  # Scan the exact code being shipped once a release is published.
  release:
    types: [published]
  # Re-run hook: rescan an existing release tag on demand.
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to scan
        required: true

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-26
    timeout-minutes: 30

    env:
      PROJECT: ShatterBreak.xcodeproj
      SCHEME: ShatterBreak
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Scan the exact tagged commit, whether triggered by the release event
          # (github.ref_name is the tag) or a manual re-run (inputs.release_tag).
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: |
          set -o pipefail
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
