name: CodeQL

on:
  # Scan the exact code being shipped once a release is published.
  release:
    types: [published]
  # On-demand hook: scan any branch, tag, or release on request.
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to scan (blank = the branch selected above)
        required: false

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (Swift)
    runs-on: macos-26
    # A full scan takes ~25 minutes; leave headroom for runner variance.
    timeout-minutes: 45

    env:
      PROJECT: ShatterBreak.xcodeproj
      SCHEME: ShatterBreak
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # release event -> the tag; workflow_dispatch -> the requested ref, or
          # the branch the run was launched from if left blank.
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.ref || github.ref_name }}

      - name: Select Xcode
        uses: ./.github/actions/select-xcode

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: swift
          build-mode: manual

      - name: Build
        run: |
          xcodebuild build \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            CODE_SIGNING_ALLOWED=NO

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:swift"
