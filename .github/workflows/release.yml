name: Release Build

# Builds, signs, and attaches the downloadable artifacts to a release. Releases
# are cut by hand: draft one in the GitHub UI (Releases → Draft a new release),
# pick the vX.Y.Z tag, generate the notes, and publish. Publishing fires this
# workflow once — it checks out the tagged commit, archives, signs, and uploads
# the .app/.dSYM zips onto that release. Nothing auto-builds on a bare tag push,
# so there is no double run. See RELEASING.md.

on:
  # The maintainer publishes a release in the UI; this attaches the artifacts.
  release:
    types: [published]
  # Re-run hook: rebuild and re-upload artifacts to an existing release without
  # unpublishing it (e.g. after a transient build/upload failure).
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing release tag to (re)build and upload artifacts to
        required: true

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  build-release:
    name: Build Release Archive
    runs-on: macos-26
    timeout-minutes: 5

    env:
      PROJECT: ShatterBreak.xcodeproj
      SCHEME: ShatterBreak
      DERIVED_DATA: ${{ github.workspace }}/DerivedData
      ARCHIVE_PATH: ${{ github.workspace }}/DerivedData/ShatterBreak.xcarchive
      RESULT_BUNDLE: ${{ github.workspace }}/ShatterBreak.xcresult
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}
      INCLUDE_SIGNING: "false"
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          # Build the exact tagged commit, whether triggered by the release event
          # (github.ref_name is the tag) or a manual re-run (inputs.release_tag).
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.release_tag || github.ref_name }}

      - name: Compute version
        run: |
          eval "$(Scripts/compute-version.sh --mode ci-release --tag "$RELEASE_TAG" --export)"
          echo "MARKETING_VERSION=$MARKETING_VERSION" >> "$GITHUB_ENV"
          echo "CURRENT_PROJECT_VERSION=$CURRENT_PROJECT_VERSION" >> "$GITHUB_ENV"
          echo "App version: $MARKETING_VERSION ($CURRENT_PROJECT_VERSION)"
          echo "APP_BUILD_HASH=$APP_BUILD_HASH" >> "$GITHUB_ENV"

      - name: Select Xcode
        run: |
          sudo xcode-select --switch /Applications/Xcode_26.5.app/Contents/Developer
          xcodebuild -version
          swift --version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Run tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -destination "platform=macOS" \
            -derivedDataPath "$DERIVED_DATA" \
            -resultBundlePath "$RESULT_BUNDLE" \
            -collect-test-diagnostics never \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
          | xcbeautify

      - name: Build release archive
        run: |
          set -o pipefail
          xcodebuild archive \
            -project "$PROJECT" \
            -scheme "$SCHEME" \
            -configuration Release \
            -archivePath "$ARCHIVE_PATH" \
            CODE_SIGNING_ALLOWED=NO \
            MARKETING_VERSION="$MARKETING_VERSION" \
            CURRENT_PROJECT_VERSION="$CURRENT_PROJECT_VERSION" \
          | xcbeautify

      - name: Sign app
        # CI has no stable signing identity, so it ad-hoc signs (SIGN_IDENTITY=-).
        # Ad-hoc DR is cdhash-based, so the Screen Recording grant does NOT survive
        # updates (issue #43). To ship an update-stable build, sign locally with a
        # reused self-signed identity instead — see Scripts/sign-release.sh and the
        # "Permissions that survive updates" section in README.md. The same script
        # drives both paths; switch by setting SIGN_IDENTITY to the cert name.
        run: |
          SIGN_IDENTITY="-" \
          ENTITLEMENTS="ShatterBreak/ShatterBreak.entitlements" \
            Scripts/sign-release.sh "$ARCHIVE_PATH/Products/Applications/ShatterBreak.app"

      - name: Package app for release
        run: |
          APP_PATH="$ARCHIVE_PATH/Products/Applications/ShatterBreak.app"
          DSYM_PATH="$ARCHIVE_PATH/dSYMs/ShatterBreak.app.dSYM"
          RELEASE_ZIP="${{ github.workspace }}/ShatterBreak-${RELEASE_TAG}.zip"
          DSYM_ZIP="${{ github.workspace }}/ShatterBreak-${RELEASE_TAG}.dSYM.zip"
          ditto -c -k --sequesterRsrc --keepParent "$APP_PATH" "$RELEASE_ZIP"
          echo "RELEASE_ZIP=$RELEASE_ZIP" >> "$GITHUB_ENV"
          if [ -d "$DSYM_PATH" ]; then
            ditto -c -k --keepParent "$DSYM_PATH" "$DSYM_ZIP"
            echo "DSYM_ZIP=$DSYM_ZIP" >> "$GITHUB_ENV"
          fi

      - name: Upload artifacts
        run: |
          RELEASE_FILES=("$RELEASE_ZIP")
          if [ -n "${DSYM_ZIP:-}" ] && [ -f "$DSYM_ZIP" ]; then
            RELEASE_FILES+=("$DSYM_ZIP")
          fi

          # The release already exists (published in the UI, or being re-run), so
          # this only attaches assets — no create step to fail or swallow. If the
          # release is missing, this fails loudly: create it in the UI first.
          gh release upload "$RELEASE_TAG" "${RELEASE_FILES[@]}" --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
