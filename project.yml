name: ShatterBreak

include:
  - path: .env/signing.yml
    optional: true

options:
  bundleIdPrefix: me.lipovoy
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES

targets:
  ShatterBreak:
    type: application
    platform: macOS
    deploymentTarget: "15.0"

    sources:
      - ShatterBreak

    settings:
      base:
        PRODUCT_MODULE_NAME: ShatterBreak
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"

        ENABLE_HARDENED_RUNTIME: YES
        ENABLE_APP_SANDBOX: YES

        CODE_SIGN_ENTITLEMENTS: ShatterBreak/ShatterBreak.entitlements

        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: YES

        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          PRODUCT_NAME: ShatterBreak Dev
          PRODUCT_BUNDLE_IDENTIFIER: me.lipovoy.shatterbreak.dev
          INFOPLIST_KEY_CFBundleName: ShatterBreak Dev
          INFOPLIST_KEY_CFBundleDisplayName: ShatterBreak Dev
        Release:
          PRODUCT_NAME: ShatterBreak
          PRODUCT_BUNDLE_IDENTIFIER: me.lipovoy.shatterbreak
          INFOPLIST_KEY_CFBundleName: ShatterBreak
          INFOPLIST_KEY_CFBundleDisplayName: ShatterBreak

    scheme:
      testTargets:
        - ShatterBreakTests

  ShatterBreakTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"

    sources:
      - ShatterBreakTests

    dependencies:
      - target: ShatterBreak

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.lipovoy.shatterbreak.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
      configs:
        Debug:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShatterBreak Dev.app/Contents/MacOS/ShatterBreak Dev
        Release:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShatterBreak.app/Contents/MacOS/ShatterBreak
