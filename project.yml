name: ShatterBreak

include:
  - path: .env/signing.yml
    enable: ${INCLUDE_SIGNING}

options:
  bundleIdPrefix: dev.lipovoy
  deploymentTarget:
    macOS: "15.0"

settings:
  base:
    ENABLE_USER_SCRIPT_SANDBOXING: NO
    DEAD_CODE_STRIPPING: YES
    ASSETCATALOG_COMPILER_GENERATE_SWIFT_ASSET_SYMBOL_EXTENSIONS: YES
    STRING_CATALOG_GENERATE_SYMBOLS: YES
    LOCALIZATION_PREFERS_STRING_CATALOGS: YES
    SWIFT_VERSION: 6.0

targets:
  ShatterBreak:
    type: application
    platform: macOS
    deploymentTarget: "15.0"

    sources:
      - ShatterBreak

    configFiles:
      Debug: Config/AppVersion.xcconfig
      Release: Config/AppVersion.xcconfig

    settings:
      base:
        PRODUCT_MODULE_NAME: ShatterBreak
        ENABLE_HARDENED_RUNTIME: YES
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_LSUIElement: YES
        ENABLE_PREVIEWS: YES
      configs:
        Debug:
          PRODUCT_NAME: ShatterBreak Dev
          PRODUCT_BUNDLE_IDENTIFIER: dev.lipovoy.shatterbreak.debug
          INFOPLIST_KEY_CFBundleName: ShatterBreak Dev
          INFOPLIST_KEY_CFBundleDisplayName: ShatterBreak Dev
          # Dev stays sandboxed and identical to release; ShatterBreakDebug.entitlements
          # adds only a dev-domain shared-preference exception so the container-less
          # `xcodebuild test` host stops faulting on its own UserDefaults domain.
          ENABLE_APP_SANDBOX: YES
          CODE_SIGN_ENTITLEMENTS: ShatterBreak/ShatterBreakDebug.entitlements
        Release:
          PRODUCT_NAME: ShatterBreak
          PRODUCT_BUNDLE_IDENTIFIER: dev.lipovoy.shatterbreak
          INFOPLIST_KEY_CFBundleName: ShatterBreak
          INFOPLIST_KEY_CFBundleDisplayName: ShatterBreak
          ENABLE_APP_SANDBOX: YES
          CODE_SIGN_ENTITLEMENTS: ShatterBreak/ShatterBreak.entitlements

    postBuildScripts:
      - name: Inject Build Hash
        script: |
          /usr/libexec/PlistBuddy \
            -c "Add :AppBuildHash string $APP_BUILD_HASH" \
            "$TARGET_BUILD_DIR/$INFOPLIST_PATH" 2>/dev/null || \
          /usr/libexec/PlistBuddy \
            -c "Set :AppBuildHash $APP_BUILD_HASH" \
            "$TARGET_BUILD_DIR/$INFOPLIST_PATH"
        basedOnDependencyAnalysis: false

    scheme:
      testTargets:
        - ShatterBreakTests
      preActions:
        - name: Compute Version
          script: |
            "${SRCROOT}/Scripts/compute-version.sh" \
              --mode local-auto \
              --write-xcconfig "${SRCROOT}/Config/Version.xcconfig"
          settingsTarget: ShatterBreak

  ShatterBreakTests:
    type: bundle.unit-test
    platform: macOS
    deploymentTarget: "15.0"

    sources:
      - ShatterBreakTests

    dependencies:
      - target: ShatterBreak

    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lipovoy.shatterbreak.tests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: $(TEST_HOST)
      configs:
        Debug:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShatterBreak Dev.app/Contents/MacOS/ShatterBreak Dev
        Release:
          TEST_HOST: $(BUILT_PRODUCTS_DIR)/ShatterBreak.app/Contents/MacOS/ShatterBreak
